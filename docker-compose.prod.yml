services:
  postgres:
    image: postgres:17-alpine
    container_name: arena-postgres
    restart: unless-stopped
    pull_policy: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ${DOCKER_REGISTRY}/arena-api:${IMAGE_TAG:-latest}
    container_name: arena-api
    restart: unless-stopped
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Search Path=arena,public"
    ports:
      - "5000:5000"

  frontend:
    image: ${DOCKER_REGISTRY}/arena-frontend:${IMAGE_TAG:-latest}
    container_name: arena-frontend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    name: arena_postgres_data
