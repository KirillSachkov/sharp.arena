services:
  postgres:
    image: postgres:17-alpine
    container_name: arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arena}
      POSTGRES_DB: ${POSTGRES_DB:-sharp_arena}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arena} -d ${POSTGRES_DB:-sharp_arena}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: arena-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arena}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-arena}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: arena-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    image: sharp-arena/arena-api:dev
    build:
      context: ./backend
      dockerfile: ArenaApi/Dockerfile
    container_name: arena-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sharp_arena};Username=${POSTGRES_USER:-arena};Password=${POSTGRES_PASSWORD:-arena}"
      ConnectionStrings__RabbitMq: "amqp://${RABBITMQ_USER:-arena}:${RABBITMQ_PASSWORD:-arena}@rabbitmq:5672/"
      ConnectionStrings__Redis: "redis:6379"
    ports:
      - "${ARENA_API_PORT:-5000}:5000"

  frontend:
    image: sharp-arena/frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: arena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
    name: arena_postgres_data
